<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الطالب | Student Platform</title>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <style>
        body { font-family: 'Cairo', 'Inter', sans-serif; }
        .resource-card { transition: all 0.3s ease; }
        .resource-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
    
    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-purple-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                        منصة الطالب
                    </span>
                </div>
                
                <div class="hidden md:flex items-center space-x-4 space-x-reverse">
                    <a href="#home" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 px-3 py-2">الرئيسية</a>
                    <a href="#categories" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 px-3 py-2">التصنيفات</a>
                    <a href="#trending" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 px-3 py-2">الأكثر زيارة</a>
                </div>
                
                <div class="flex items-center gap-3">
                    <button onclick="toggleDarkMode()" class="p-2 rounded-lg text-gray-600 dark:text-gray-400">
                        <i class="fas fa-moon dark:hidden"></i>
                        <i class="fas fa-sun hidden dark:block"></i>
                    </button>
                    <button onclick="openAuthModal()" class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-4 py-2 rounded-lg text-sm font-medium">
                        تسجيل الدخول
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="pt-32 pb-20 lg:pt-40 lg:pb-32">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center" data-aos="fade-up">
                <h1 class="text-4xl md:text-6xl lg:text-7xl font-bold text-gray-900 dark:text-white mb-6">
                    كل ما يحتاجه الطالب<br>
                    <span class="bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 bg-clip-text text-transparent">في مكان واحد</span>
                </h1>
                <p class="text-xl text-gray-600 dark:text-gray-400 mb-10 max-w-2xl mx-auto">
                    اكتشف أفضل الأدوات والموارد والمصادر المفيدة للجامعيين
                </p>
                <div class="flex flex-col sm:flex-row gap-4 justify-center">
                    <a href="#categories" class="px-8 py-4 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-xl font-semibold text-lg shadow-lg hover:shadow-xl transition-all">
                        استكشف المصادر
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Categories -->
    <section id="categories" class="py-20 bg-white dark:bg-gray-800/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16">
                <h2 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white mb-4">تصنيفات المصادر</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="categories-grid">
                <!-- Categories loaded by JS -->
            </div>
        </div>
    </section>

    <!-- Resources -->
    <section id="resources" class="py-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12">
                <h2 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white mb-4">جميع المصادر</h2>
                <div class="flex flex-wrap justify-center gap-3 mt-8">
                    <button onclick="filterResources('all')" class="filter-btn active px-6 py-2 rounded-full bg-blue-600 text-white text-sm font-medium">الكل</button>
                    <button onclick="filterResources('academic')" class="filter-btn px-6 py-2 rounded-full bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-sm font-medium border border-gray-200 dark:border-gray-700">أكاديمي</button>
                    <button onclick="filterResources('productivity')" class="filter-btn px-6 py-2 rounded-full bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-sm font-medium border border-gray-200 dark:border-gray-700">إنتاجية</button>
                    <button onclick="filterResources('tech')" class="filter-btn px-6 py-2 rounded-full bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-sm font-medium border border-gray-200 dark:border-gray-700">تقنية</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="resources-grid">
                <!-- Resources loaded by JS -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-300 py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center">
                <p>© 2024 منصة الطالب. جميع الحقوق محفوظة.</p>
            </div>
        </div>
    </footer>

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6">
            <h3 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">تسجيل الدخول</h3>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="email" id="login-email" placeholder="البريد الإلكتروني" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                <input type="password" id="login-password" placeholder="كلمة المرور" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg font-semibold">تسجيل الدخول</button>
            </form>
        </div>
    </div>

    <script>
        // Initialize AOS
        AOS.init({ once: true, duration: 800 });
        
        // Dark Mode Toggle
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }
        
        // Check saved dark mode
        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }
        
        // Sample Data
        const categories = [
            { id: 'academic', name: 'مصادر أكاديمية', icon: 'fa-book', color: 'from-blue-500 to-blue-600' },
            { id: 'productivity', name: 'إنتاجية وتنظيم', icon: 'fa-tasks', color: 'from-green-500 to-green-600' },
            { id: 'tech', name: 'برمجة وتقنية', icon: 'fa-code', color: 'from-purple-500 to-purple-600' },
            { id: 'design', name: 'تصميم وإبداع', icon: 'fa-palette', color: 'from-pink-500 to-pink-600' }
        ];
n\n        const resources = [\n            { id: 1, name: 'Google Scholar', category: 'academic', description: 'محرك بحث أكاديمي مجاني', url: 'https://scholar.google.com', rating: 4.9, icon: 'https://scholar.google.com/favicon.ico' },\n            { id: 2, name: 'Notion', category: 'productivity', description: 'منصة شاملة لتنظيم الملاحظات', url: 'https://notion.so', rating: 4.8, icon: 'https://www.notion.so/images/favicon.ico' },\n            { id: 3, name: 'GitHub', category: 'tech', description: 'منصة استضافة الكود', url: 'https://github.com', rating: 4.9, icon: 'https://github.com/favicon.ico' },\n            { id: 4, name: 'Canva', category: 'design', description: 'أداة تصميم رسومية', url: 'https://canva.com', rating: 4.7, icon: 'https://www.canva.com/favicon.ico' }\n        ];\n\n        // Render Categories\n        function renderCategories() {\n            const grid = document.getElementById('categories-grid');\n            grid.innerHTML = categories.map(cat => `\n                <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 text-center shadow-lg hover:shadow-xl transition-all cursor-pointer" onclick="filterResources('${cat.id}')">\n                    <div class=\"w-16 h-16 mx-auto mb-4 bg-gradient-to-br ${cat.color} rounded-2xl flex items-center justify-center text-white text-2xl\">\n                        <i class=\"fas ${cat.icon}\"></i>\n                    </div>\n                    <h3 class=\"font-bold text-gray-900 dark:text-white text-lg\">${cat.name}</h3>\n                </div>\n            `).join('');\n        }\n\n        // Render Resources\n        function renderResources(filter = 'all') {\n            const grid = document.getElementById('resources-grid');\n            const filtered = filter === 'all' ? resources : resources.filter(r => r.category === filter);\n            \n            grid.innerHTML = filtered.map(r => `\n                <div class=\"resource-card bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg\">\n                    <div class=\"flex items-center gap-4 mb-4\">\n                        <img src=\"${r.icon}\" alt=\"${r.name}\" class=\"w-12 h-12 rounded-lg object-contain\" onerror=\"this.src='https://via.placeholder.com/48'\">\n                        <div>\n                            <h3 class=\"font-bold text-gray-900 dark:text-white\">${r.name}</h3>\n                            <div class=\"text-yellow-500 text-sm\"><i class=\"fas fa-star\"></i> ${r.rating}</div>\n                        </div>\n                    </div>\n                    <p class=\"text-gray-600 dark:text-gray-400 text-sm mb-4\">${r.description}</p>\n                    <a href=\"${r.url}\" target=\"_blank\" class=\"block w-full py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg text-center font-semibold hover:shadow-lg transition-all\">\n                        زيارة الموقع <i class=\"fas fa-external-link-alt mr-2\"></i>\n                    </a>\n                </div>\n            `).join('');\n        }\n\n        // Filter Resources\n        function filterResources(category) {\n            document.querySelectorAll('.filter-btn').forEach(btn => {\n                btn.classList.remove('active', 'bg-blue-600', 'text-white');\n                btn.classList.add('bg-white', 'dark:bg-gray-800', 'text-gray-700', 'dark:text-gray-300');\n            });\n            event.target.classList.remove('bg-white', 'dark:bg-gray-800', 'text-gray-700', 'dark:text-gray-300');\n            event.target.classList.add('active', 'bg-blue-600', 'text-white');\n            renderResources(category);\n        }\n\n        // Auth Modal\n        function openAuthModal() {\n            document.getElementById('auth-modal').classList.remove('hidden');\n            document.getElementById('auth-modal').classList.add('flex');\n        }\n\n        function handleLogin(e) {\n            e.preventDefault();\n            alert('تم تسجيل الدخول! (نظام المصادقة يحتاج إعداد Supabase)');\n            document.getElementById('auth-modal').classList.add('hidden');\n        }\n\n        // Initialize\n        renderCategories();\n        renderResources();\n    </script>\n</body>\n</html>
