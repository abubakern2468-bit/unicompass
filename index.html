<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الطالب | Student Platform</title>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .resource-card { transition: all 0.3s ease; }
        .resource-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
    
    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-purple-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                        منصة الطالب
                    </span>
                </div>
                
                <div class="flex items-center gap-3">
                    <span id="user-status" class="text-sm text-gray-600 dark:text-gray-400 hidden"></span>
                    <button onclick="toggleDarkMode()" class="p-2 rounded-lg text-gray-600 dark:text-gray-400">
                        <i class="fas fa-moon dark:hidden"></i>
                        <i class="fas fa-sun hidden dark:block"></i>
                    </button>
                    <button id="auth-btn" onclick="openAuthModal()" class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-4 py-2 rounded-lg text-sm font-medium">
                        تسجيل الدخول
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Loading State -->
    <div id="loading" class="fixed inset-0 bg-white dark:bg-gray-900 z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="loading mb-4"></div>
            <p class="text-gray-600 dark:text-gray-400">جاري التحميل...</p>
        </div>
    </div>

    <!-- Hero Section -->
    <section id="home" class="pt-32 pb-20 lg:pt-40 lg:pb-32">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center">
                <h1 class="text-4xl md:text-6xl lg:text-7xl font-bold text-gray-900 dark:text-white mb-6">
                    كل ما يحتاجه الطالب<br>
                    <span class="bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 bg-clip-text text-transparent">في مكان واحد</span>
                </h1>
                <p class="text-xl text-gray-600 dark:text-gray-400 mb-10 max-w-2xl mx-auto">
                    اكتشف أفضل الأدوات والموارد والمصادر المفيدة للجامعيين
                </p>
            </div>
        </div>
    </section>

    <!-- Categories -->
    <section id="categories" class="py-20 bg-white dark:bg-gray-800/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16">
                <h2 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white mb-4">تصنيفات المصادر</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="categories-grid">
                <!-- Loading -->
                <div class="col-span-4 text-center py-12">
                    <div class="loading"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Resources -->
    <section id="resources" class="py-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12">
                <h2 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white mb-4">جميع المصادر</h2>
                <div class="flex flex-wrap justify-center gap-3 mt-8" id="filter-buttons">
                    <button onclick="filterResources('all')" class="filter-btn active px-6 py-2 rounded-full bg-blue-600 text-white text-sm font-medium">الكل</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="resources-grid">
                <!-- Loading -->
                <div class="col-span-4 text-center py-12">
                    <div class="loading"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6">
            <h3 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">تسجيل الدخول</h3>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="email" id="login-email" placeholder="البريد الإلكتروني" required class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                <input type="password" id="login-password" placeholder="كلمة المرور" required class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg font-semibold">تسجيل الدخول</button>
            </form>
            <p class="mt-4 text-center text-sm text-gray-600 dark:text-gray-400">
                ليس لديك حساب؟ <a href="#" onclick="showSignup()" class="text-blue-600 hover:underline">سجل الآن</a>
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/supabase.js"></script>
    <script>
        // Dark Mode
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }
        
        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }

        // Load Data from Supabase
        async function loadData() {
            try {
                // Load categories
                const categories = await window.db.getCategories();
                renderCategories(categories);
                
                // Load resources
                const resources = await window.db.getResources();
                renderResources(resources);
                
                // Hide loading
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loading').innerHTML = '<p class="text-red-500">خطأ في تحميل البيانات</p>';
            }
        }

        // Render Categories
        function renderCategories(categories) {
            const grid = document.getElementById('categories-grid');
            
            if (!categories || categories.length === 0) {
                grid.innerHTML = '<div class="col-span-4 text-center text-gray-500">لا توجد تصنيفات</div>';
                return;
            }
            
            grid.innerHTML = categories.map(cat => `
                <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 text-center shadow-lg hover:shadow-xl transition-all cursor-pointer" onclick="filterResources('${cat.id}')">
                    <div class="w-16 h-16 mx-auto mb-4 bg-gradient-to-br ${cat.color} rounded-2xl flex items-center justify-center text-white text-2xl">
                        <i class="fas ${cat.icon}"></i>
                    </div>
                    <h3 class="font-bold text-gray-900 dark:text-white text-lg">${cat.name}</h3>
                </div>
            `).join('');
            
            // Update filter buttons
            const filterContainer = document.getElementById('filter-buttons');
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn px-6 py-2 rounded-full bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-sm font-medium border border-gray-200 dark:border-gray-700';
                btn.textContent = cat.name;
                btn.onclick = () => filterResources(cat.id);
                filterContainer.appendChild(btn);
            });
        }

        // Render Resources
        function renderResources(resources) {
            const grid = document.getElementById('resources-grid');
            
            if (!resources || resources.length === 0) {
                grid.innerHTML = '<div class="col-span-4 text-center text-gray-500">لا توجد مصادر</div>';
                return;
            }
            
            grid.innerHTML = resources.map(r => `
                <div class="resource-card bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
                    <div class="flex items-center gap-4 mb-4">
                        <img src="${r.icon || 'https://via.placeholder.com/48'}" alt="${r.name}" class="w-12 h-12 rounded-lg object-contain" onerror="this.src='https://via.placeholder.com/48'">
                        <div>
                            <h3 class="font-bold text-gray-900 dark:text-white">${r.name}</h3>
                            <div class="text-yellow-500 text-sm">
                                <i class="fas fa-star"></i> ${r.rating || '0'} 
                                <span class="text-gray-400 mr-2">(${r.views || 0} زيارة)</span>
                            </div>
                        </div>
                    </div>
                    <p class="text-gray-600 dark:text-gray-400 text-sm mb-4">${r.description || ''}</p>
                    <a href="${r.url}" target="_blank" onclick="window.db.incrementViews(${r.id})" class="block w-full py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg text-center font-semibold hover:shadow-lg transition-all">
                        زيارة الموقع <i class="fas fa-external-link-alt mr-2"></i>
                    </a>
                </div>
            `).join('');
        }

        // Filter Resources
        async function filterResources(category) {
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-blue-600', 'text-white');
                btn.classList.add('bg-white', 'dark:bg-gray-800', 'text-gray-700', 'dark:text-gray-300');
            });
            event.target.classList.remove('bg-white', 'dark:bg-gray-800', 'text-gray-700', 'dark:text-gray-300');
            event.target.classList.add('active', 'bg-blue-600', 'text-white');
            
            // Show loading
            document.getElementById('resources-grid').innerHTML = '<div class="col-span-4 text-center py-12"><div class="loading"></div></div>';
            
            // Load filtered resources
            const resources = await window.db.getResources(category);
            renderResources(resources);
        }

        // Auth Modal
        function openAuthModal() {
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('auth-modal').classList.add('flex');
        }

        function closeAuthModal() {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('auth-modal').classList.remove('flex');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            const result = await window.auth.signIn(email, password);
            if (result) {
                closeAuthModal();
                updateUIForLoggedInUser(result.user);
            }
        }

        function updateUIForLoggedInUser(user) {
            document.getElementById('user-status').textContent = user.email;
            document.getElementById('user-status').classList.remove('hidden');
            document.getElementById('auth-btn').textContent = 'تسجيل الخروج';
            document.getElementById('auth-btn').onclick = handleLogout;
        }

        async function handleLogout() {
            await window.auth.signOut();
            document.getElementById('user-status').classList.add('hidden');
            document.getElementById('auth-btn').textContent = 'تسجيل الدخول';
            document.getElementById('auth-btn').onclick = openAuthModal;
        }

        function showSignup() {
            alert('نظام التسجيل يحتاج إعداد إضافي في Supabase Authentication');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Check if user is logged in
            window.auth.getCurrentUser().then(user => {
                if (user) {
                    updateUIForLoggedInUser(user);
                }
            });
            
            // Load data
            loadData();
        });

        // Close modal on outside click
        document.getElementById('auth-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('auth-modal')) {
                closeAuthModal();
            }
        });
    </script>
</body>
</html>
